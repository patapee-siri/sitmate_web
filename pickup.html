<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Checkout - SITMATE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* สไตล์สำหรับ Dropdown ปรับให้รองรับ Safari/iOS */
        .select-station {
            width: 100%;
            padding: 12px 10px; /* เพิ่มพื้นที่กดให้ง่ายขึ้นบนมือถือ */
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background-color: #fff;
            color: #333;
            -webkit-appearance: none; /* สำคัญมากสำหรับ iOS Safari */
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>'); /* ใส่ลูกศรจำลองลงไปแทน */
            background-repeat: no-repeat;
            background-position-x: 95%;
            background-position-y: 50%;
            box-sizing: border-box;
        }

        /* ปรับ Layout ของ Input Group สำหรับมือถือ */
        .responsive-input-group {
            display: flex;
            flex-direction: row; /* จัดเรียงแนวนอน */
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        /* ถ้าระยะแคบเกินไปในจอบางรุ่น ให้เด้งลงมาซ้อนกัน */
        @media (max-width: 380px) {
            .responsive-input-group {
                flex-direction: column;
                gap: 15px;
            }
            .to-text {
                transform: rotate(90deg); /* หมุนคำว่า To ลงมา */
            }
        }
    </style>
</head>
<body class="how-to-page checkout-page" style="margin: 0; padding: 0; overflow-x: hidden;">
    <div class="iphone-container" style="width: 100%; max-width: 414px; margin: 0 auto; overflow: hidden;">
        
        <div class="top-section" style="width: 100%;">
            <div class="top-section-inner" style="width: 100%; padding: 0 15px; box-sizing: border-box;">
                
                <nav class="navbar" style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding-top: 20px;">
                    <img src="logo_small.jpg" alt="Logo" class="logo-small" style="max-height: 30px;">
                    <div class="nav-links" style="display: flex; gap: 10px;">
                        <a href="#" style="text-decoration: none; font-size: 14px;">Home</a> 
                        <a href="#" style="text-decoration: none; font-size: 14px;">About</a> 
                        <a href="#" style="text-decoration: none; font-size: 14px;">Blog</a> 
                        <a href="#" style="text-decoration: none; font-size: 14px;">Collection</a>
                    </div>
                </nav>

                <header class="main-header" style="margin-top: 30px; text-align: center;">
                    <img src="logo.png" alt="SITMATE Large Logo" class="logo-large" style="max-width: 150px; height: auto;">
                </header>
            </div>

            <div class="checkout-progress">
                <div class="checkout-step active">
                    <div class="checkout-step-label">Select Pickup and<br>Return Location</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step">
                    <div class="checkout-step-label">Select Payment<br>Method</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step">
                    <div class="checkout-step-label">Pay</div>
                    <div class="checkout-step-dot"></div>
                </div>
            </div>
        </div>

        <div class="checkout-content" style="padding: 0 15px; box-sizing: border-box;">
            
            <div class="glass-box items-section">
                <h2 class="box-title">Items</h2>
                <div class="item-card">
                    <img src="real_logo.png" alt="Product" class="item-img">
                    
                    <div class="item-details">
                        <h3 class="product-id">ST - 00126</h3>
                        <p class="price-green">40 THB</p>
                        <p class="price-label">Subtotal</p>
                        <p class="price-green">400 THB</p>
                        <p class="price-label">Security Deposit</p>
                    </div>

                    <div class="item-action">
                        <span class="add-more-text">Add more</span>
                        <img src="scan.png" alt="Scan" class="scan-btn" width="38" height="38">
                    </div>
                </div>
            </div>

            <div class="glass-box total-section">
                <h2 class="box-title">Choose Pickup & Return Point</h2>
                
                <div class="responsive-input-group">
                    
                    <div style="flex: 1; width: 100%;">
                        <select class="select-station">
                            <option value="" disabled selected>Pickup Station</option>
                            <option value="krung_thep_aphiwat">สถานีกลางกรุงเทพอภิวัฒน์</option>
                            <option value="hua_lamphong">กรุงเทพ (หัวลำโพง)</option>
                            <option value="chiang_mai">เชียงใหม่</option>
                            <option value="nong_khai">หนองคาย</option>
                            <option value="khon_kaen">ขอนแก่น</option>
                            <option value="udon_thani">อุดรธานี</option>
                            <option value="surat_thani">สุราษฎร์ธานี</option>
                            <option value="hat_yai">ชุมทางหาดใหญ่</option>
                            <option value="hua_hin">หัวหิน</option>
                            <option value="chumphon">ชุมพร</option>
                        </select>
                    </div>
                    
                    <div class="to-text" style="font-weight: bold; color: #666;">To</div>
                    
                    <div style="flex: 1; width: 100%;">
                        <select class="select-station">
                            <option value="" disabled selected>Return Station</option>
                            <option value="krung_thep_aphiwat">สถานีกลางกรุงเทพอภิวัฒน์</option>
                            <option value="hua_lamphong">กรุงเทพ (หัวลำโพง)</option>
                            <option value="chiang_mai">เชียงใหม่</option>
                            <option value="nong_khai">หนองคาย</option>
                            <option value="khon_kaen">ขอนแก่น</option>
                            <option value="udon_thani">อุดรธานี</option>
                            <option value="surat_thani">สุราษฎร์ธานี</option>
                            <option value="hat_yai">ชุมทางหาดใหญ่</option>
                            <option value="hua_hin">หัวหิน</option>
                            <option value="chumphon">ชุมพร</option>
                        </select>
                    </div>
                    
                </div>
            </div>

            <div class="checkout-button-wrapper" style="margin: 30px 0;">
                <button class="btn-orange continue-btn" style="width: 100%;">Continue</button>
            </div>
            
        </div>

    </div>
</body>
</html>
