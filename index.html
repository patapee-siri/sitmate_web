<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SitMate Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ========== iPhone 11 Safe Area ========== */
        :root {
            --sat: env(safe-area-inset-top, 44px);
            --sab: env(safe-area-inset-bottom, 34px);
        }

        body {
            padding-top: var(--sat);
            padding-bottom: var(--sab);
        }

        .iphone-container {
            max-width: 414px;
            min-height: 896px;
            height: 100svh;
            overflow: hidden;
            position: relative;
        }

        /* ========== AMBIENT FLOATING PARTICLES ========== */
        .particles-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(216,150,71,0.35) 0%, transparent 70%);
            animation: floatUp linear infinite;
        }

        .particle:nth-child(1)  { width: 60px;  height: 60px;  left: 10%;  animation-duration: 8s;  animation-delay: 0s;   bottom: -80px; }
        .particle:nth-child(2)  { width: 30px;  height: 30px;  left: 25%;  animation-duration: 11s; animation-delay: 1.5s; bottom: -50px; }
        .particle:nth-child(3)  { width: 80px;  height: 80px;  left: 60%;  animation-duration: 9s;  animation-delay: 0.8s; bottom: -100px; }
        .particle:nth-child(4)  { width: 20px;  height: 20px;  left: 80%;  animation-duration: 13s; animation-delay: 3s;   bottom: -40px; }
        .particle:nth-child(5)  { width: 45px;  height: 45px;  left: 45%;  animation-duration: 7s;  animation-delay: 2.2s; bottom: -60px; }
        .particle:nth-child(6)  { width: 15px;  height: 15px;  left: 90%;  animation-duration: 10s; animation-delay: 0.5s; bottom: -30px; }

        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);   opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(0.4); opacity: 0; }
        }

        /* ========== SHIMMER + SCAN LINE ON GLASS PANEL ========== */
        .glass-panel-index {
            overflow: hidden;
        }

        .glass-panel-index::before {
            content: '';
            position: absolute;
            left: 0; right: 0;
            top: -20px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(216,150,71,0.4), transparent);
            animation: scanLine 6s linear infinite;
        }

        .glass-panel-index::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                105deg,
                transparent 40%,
                rgba(255,255,255,0.15) 50%,
                transparent 60%
            );
            animation: shimmer 5s ease-in-out infinite;
        }

        @keyframes scanLine {
            0%   { top: -20px; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 0.5; }
            100% { top: calc(100% + 20px); opacity: 0; }
        }

        @keyframes shimmer {
            0%   { left: -100%; }
            50%  { left: 150%; }
            100% { left: 150%; }
        }

        /* ========== ENTRANCE ANIMATIONS ========== */
        .logo-section {
            animation: dropIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes dropIn {
            from { transform: translateY(-30px); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }

        .product-id-section {
            animation: fadeSlideUp 0.6s ease 0.2s both;
        }

        .product-pic-section {
            animation: fadeSlideUp 0.7s ease 0.35s both;
        }

        .button-section {
            animation: fadeSlideUp 0.6s ease 0.5s both;
        }

        @keyframes fadeSlideUp {
            from { transform: translateY(22px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        /* ========== RED DOT PULSE ========== */
        .red-dot {
            position: relative;
        }

        .red-dot::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255, 59, 48, 0.5);
            animation: dotPulse 2s ease-out infinite;
        }

        @keyframes dotPulse {
            0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
        }

        /* ========== PRODUCT IMAGE FLOAT ========== */
        .product-pic-section img {
            animation: gentleFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 18px 28px rgba(216, 150, 71, 0.28));
        }

        @keyframes gentleFloat {
            0%, 100% { transform: scale(1.3) translateY(0px)  rotate(0deg); }
            33%       { transform: scale(1.3) translateY(-7px) rotate(0.5deg); }
            66%       { transform: scale(1.3) translateY(4px)  rotate(-0.5deg); }
        }

        /* ========== ID GLOW ========== */
        .product-id-section h1 {
            animation: idGlow 3s ease-in-out infinite alternate;
        }

        @keyframes idGlow {
            from { text-shadow: 0 0 0px transparent; }
            to   { text-shadow: 0 0 18px rgba(216, 150, 71, 0.3); }
        }

        /* ========== BUTTON SHINE + TAP ========== */
        .index-special-button {
            position: relative;
            overflow: hidden;
            transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.18s ease;
        }

        .index-special-button::after {
            content: '';
            position: absolute;
            top: 0; left: -80%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                105deg,
                transparent 30%,
                rgba(255,255,255,0.28) 50%,
                transparent 70%
            );
            animation: btnShine 4s ease-in-out infinite;
            border-radius: inherit;
        }

        .button-section a:nth-child(1)::after { animation-delay: 0s; }
        .button-section a:nth-child(2)::after { animation-delay: 1.4s; }
        .button-section a:nth-child(3)::after { animation-delay: 2.8s; }

        @keyframes btnShine {
            0%  { left: -80%; }
            30% { left: 130%; }
            100%{ left: 130%; }
        }

        .index-special-button:active {
            transform: scale(0.93) !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15) !important;
        }
    </style>
</head>
<body>
    <div class="iphone-container">

        <!-- Ambient floating particles -->
        <div class="particles-bg">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <div class="glass-panel-index"></div>

        <div class="logo-section">
            <img src="logo.png" alt="SITMATE">
        </div>

        <div class="product-id-section">
            <p>Product ID <span class="red-dot"></span></p>
            <h1>ST - 00126</h1>
        </div>

        <div class="product-pic-section">
            <img src="real_logo.png" alt="SitMate Product">
        </div>

        <div class="button-section">
            <a href="rent.html" class="index-special-button">Rent Now</a>
            <a href="track.html" class="index-special-button">Track Status</a>
            <a href="how-to.html" class="index-special-button">How to Use</a>
        </div>

    </div>
</body>
</html>
