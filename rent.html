<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Checkout - SITMATE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* เพิ่มสไตล์นิดหน่อยให้ Dropdown ดูสวยงามเข้ากับกล่องเดิม */
        .select-station {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            background-color: #f9f9f9;
            color: #333;
            appearance: none;
        }

        /* ===== PROGRESS ANIMATION STYLES ===== */
        .checkout-step-dot {
            transition: background-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .checkout-step.active .checkout-step-dot {
            background-color: #C28329;
            box-shadow: 0 0 0 4px rgba(194,131,41,0.2);
            transform: scale(1.25);
            animation: dotActivePulse 2s ease-out infinite;
        }
        @keyframes dotActivePulse {
            0%   { box-shadow: 0 0 0 4px rgba(194,131,41,0.3); }
            70%  { box-shadow: 0 0 0 10px rgba(194,131,41,0); }
            100% { box-shadow: 0 0 0 4px rgba(194,131,41,0); }
        }
        .checkout-step.active .checkout-step-label {
            font-weight: 900;
            color: #8a5c1a;
        }
        .checkout-step.completed .checkout-step-dot {
            background-color: #C28329;
            opacity: 0.55;
        }
        .checkout-step.completed .checkout-step-label {
            opacity: 0.6;
        }
    </style>
</head>
<body class="how-to-page checkout-page" style="margin: 0; padding: 0;">
    <div class="iphone-container">
        
        <div class="top-section" style="width: 100%;">
            <div class="top-section-inner" style="width: 100%;">
                <nav class="navbar" style="display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100%; box-sizing: border-box !important; padding: 20px 40px 0 10px !important;">
                    <img src="logo_small.jpg" alt="Logo" class="logo-small" style="margin: 0; display: block;">
                    <div class="nav-links" style="display: flex !important; gap: 10px !important; margin: 0; padding: 0;">
                        <a href="#" style="text-decoration: none;">Home</a> 
                        <a href="#" style="text-decoration: none;">About</a> 
                        <a href="#" style="text-decoration: none;">Blog</a> 
                        <a href="#" style="text-decoration: none;">Collection</a>
                    </div>
                </nav>

                <header class="main-header" style="margin-top: 40px !important; width: 100%; display: flex; justify-content: center; align-items: center; margin-left: -25px;">
                    <img src="logo.png" alt="SITMATE Large Logo" class="logo-large" style="display: block; margin: 0 auto;">
                </header>
            </div>

            <div class="checkout-progress">
                <div class="checkout-step active">
                    <div class="checkout-step-label">Select Pickup and<br>Return Location</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step">
                    <div class="checkout-step-label">Select Payment<br>Method</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step">
                    <div class="checkout-step-label">Pay</div>
                    <div class="checkout-step-dot"></div>
                </div>
            </div>
        </div>

        <div class="checkout-content">
            <div class="glass-box items-section">
                <h2 class="box-title">Items</h2>
                <div class="item-card">
                    <img src="real_logo.png" alt="Product" class="item-img">
                    
                    <div class="item-details">
                        <h3 class="product-id">ST - 00126</h3>
                        <p class="price-green">40 THB</p>
                        <p class="price-label">Subtotal</p>
                        <p class="price-green">400 THB</p>
                        <p class="price-label">Security Deposit</p>
                    </div>

                    <div class="item-action">
                        <span class="add-more-text">Add more</span>
                        <img src="scan.png" alt="Scan" class="scan-btn" width="38" height="38">
                    </div>
                </div>
            </div>

            <div class="glass-box total-section">
                <h2 class="box-title">Choose Pickup & Return Point</h2>
                <div class="input-group" style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    
                    <select class="date-input select-station" style="flex: 1;">
                        <option value="" disabled selected>Pickup Station</option>
                        <option value="krung_thep_aphiwat">สถานีกลางกรุงเทพอภิวัฒน์</option>
                        <option value="hua_lamphong">กรุงเทพ (หัวลำโพง)</option>
                        <option value="chiang_mai">เชียงใหม่</option>
                        <option value="nong_khai">หนองคาย</option>
                        <option value="khon_kaen">ขอนแก่น</option>
                        <option value="udon_thani">อุดรธานี</option>
                        <option value="surat_thani">สุราษฎร์ธานี</option>
                        <option value="hat_yai">ชุมทางหาดใหญ่</option>
                        <option value="hua_hin">หัวหิน</option>
                        <option value="chumphon">ชุมพร</option>
                    </select>
                    
                    <div class="to-text">To</div>
                    
                    <select class="date-input select-station" style="flex: 1;">
                        <option value="" disabled selected>Return Station</option>
                        <option value="krung_thep_aphiwat">สถานีกลางกรุงเทพอภิวัฒน์</option>
                        <option value="hua_lamphong">กรุงเทพ (หัวลำโพง)</option>
                        <option value="chiang_mai">เชียงใหม่</option>
                        <option value="nong_khai">หนองคาย</option>
                        <option value="khon_kaen">ขอนแก่น</option>
                        <option value="udon_thani">อุดรธานี</option>
                        <option value="surat_thani">สุราษฎร์ธานี</option>
                        <option value="hat_yai">ชุมทางหาดใหญ่</option>
                        <option value="hua_hin">หัวหิน</option>
                        <option value="chumphon">ชุมพร</option>
                    </select>
                    
                </div>
            </div>

            <div class="checkout-button-wrapper">
                <a href="payment.html" class="btn-orange continue-btn" style="text-decoration: none; display: inline-block; text-align: center;">Continue</a>
            </div>
        </div>

    </div>
</body>
</html>
