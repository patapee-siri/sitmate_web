<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        #reader { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 400px; text-align: center;">
        <h2>สแกนที่รองสินค้า</h2>
        <div id="reader"></div>
        <p id="result" style="margin-top: 20px; font-weight: bold;"></p>
        <button onclick="location.href='index.html'">กลับหน้าหลัก</button>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // หยุดการสแกนหลังจากเจอโค้ด
            html5QrcodeScanner.clear().then(_ => {
                document.getElementById('result').innerText = "สแกนสำเร็จ: " + decodedText;
                alert("สแกนสินค้าชิ้นนี้แล้ว: " + decodedText);
                // ส่งต่อไปยังหน้าเช่า พร้อมส่ง ID สินค้าไป
                window.location.href = "rent.html?item_id=" + decodedText;
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
