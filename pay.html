<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pay - SITMATE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== PROGRESS ANIMATION STYLES ===== */
        .checkout-step-dot {
            transition: background-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .checkout-step.active .checkout-step-dot {
            background-color: #C28329;
            box-shadow: 0 0 0 4px rgba(194,131,41,0.2);
            transform: scale(1.25);
            animation: dotActivePulse 2s ease-out infinite;
        }
        @keyframes dotActivePulse {
            0%   { box-shadow: 0 0 0 4px rgba(194,131,41,0.3); }
            70%  { box-shadow: 0 0 0 10px rgba(194,131,41,0); }
            100% { box-shadow: 0 0 0 4px rgba(194,131,41,0); }
        }
        .checkout-step.active .checkout-step-label {
            font-weight: 900;
            color: #8a5c1a;
        }
        .checkout-step.completed .checkout-step-dot {
            background-color: #C28329;
            opacity: 0.55;
        }
        .checkout-step.completed .checkout-step-label {
            opacity: 0.6;
        }
    </style>
</head>
<body class="how-to-page checkout-page">
    <div class="iphone-container">
        
        <div class="top-section">
            <div class="top-section-inner">
                <nav class="navbar">
                    <img src="logo_small.jpg" alt="Logo" class="logo-small">
                    <div class="nav-links">
                        <a href="#">Home</a> <a href="#">About</a> <a href="#">Blog</a> <a href="#">Collection</a>
                    </div>
                </nav>
                <header class="main-header">
                    <img src="logo.png" alt="SITMATE Large Logo" class="logo-large">
                </header>
            </div>

            <div class="checkout-progress">
                <div class="checkout-step completed">
                    <div class="checkout-step-label">Select Pickup and<br>Return Location</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step completed">
                    <div class="checkout-step-label">Select Payment<br>Method</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step active">
                    <div class="checkout-step-label">Pay</div>
                    <div class="checkout-step-dot"></div>
                </div>
            </div>
        </div>

        <div class="checkout-content">
            <div class="timer-text">02 : 08</div>

            <div class="qr-slip-container">
                <div class="qr-slip-top">
                    <img src="qr_cash.jpg" class="qr-code-img" alt="QR Code Payment">
                </div>
                
                <div class="qr-slip-divider"></div>
                
                <div class="qr-slip-bottom">
                    440 THB
                </div>
            </div>
                <div class="glass-box payment-form-box">
                <div class="form-title">Enter details to receive deposit</div>
                <div class="form-group">
                    <label class="form-label">Bank Name</label>
                    <input type="text" class="custom-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Input Bank Account Number</label>
                    <input type="text" class="custom-input">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="confirm-info" class="custom-checkbox">
                    <label for="confirm-info">Confirm Information</label>
                </div>
            </div>
            
            <div class="checkout-button-wrapper">
                <a href="confirm.html" class="btn-orange continue-btn" style="text-decoration: none; display: inline-block; text-align: center;">Continue</a>
            </div>

        </div> </div> </body>
</html>
