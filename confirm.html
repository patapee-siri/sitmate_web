<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Payment Confirmed - SITMATE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --sat: env(safe-area-inset-top, 44px);
            --sab: env(safe-area-inset-bottom, 34px);
            --gold: #C28329;
            --gold-light: #d89647;
        }

        body.confirm-page {
            background-color: white;
            margin: 0; padding: 0;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
        }

        .iphone-container {
            background: white;
            display: flex;
            flex-direction: column;
            min-height: 100svh;
        }

        /* ========== ANIMATED CHECKMARK ========== */
        .check-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: checkWrapperPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }

        @keyframes checkWrapperPop {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        /* Outer ring */
        .check-ring-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid rgba(194,131,41,0.15);
            animation: ringExpand 0.6s ease 0.3s both;
        }

        @keyframes ringExpand {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        /* Pulse rings */
        .check-pulse {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(194,131,41,0.4);
            animation: pulseRing 2.5s ease-out 0.8s infinite;
        }

        .check-pulse.delay {
            animation-delay: 1.5s;
        }

        @keyframes pulseRing {
            0%   { transform: scale(1);   opacity: 0.6; }
            100% { transform: scale(1.7); opacity: 0; }
        }

        /* Circle background */
        .check-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff8ee 0%, #fdefc8 100%);
            border: 3px solid var(--gold-light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow:
                0 0 0 6px rgba(216,150,71,0.1),
                0 12px 32px rgba(194,131,41,0.2);
        }

        /* SVG checkmark draw animation */
        .check-svg {
            width: 56px;
            height: 56px;
            overflow: visible;
        }

        .check-path {
            fill: none;
            stroke: var(--gold);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 80;
            stroke-dashoffset: 80;
            animation: drawCheck 0.55s cubic-bezier(0.65,0,0.35,1) 0.65s forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Sparkles around circle */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold-light);
            opacity: 0;
            animation: sparklePop 0.4s ease forwards;
        }

        .sparkle:nth-child(1) { top: 4px;  left: 50%; transform: translateX(-50%); animation-delay: 1.1s; }
        .sparkle:nth-child(2) { top: 20%;  right: 6px; animation-delay: 1.15s; }
        .sparkle:nth-child(3) { bottom: 20%; right: 6px; animation-delay: 1.2s; }
        .sparkle:nth-child(4) { bottom: 4px; left: 50%; transform: translateX(-50%); animation-delay: 1.25s; }
        .sparkle:nth-child(5) { bottom: 20%; left: 6px; animation-delay: 1.2s; }
        .sparkle:nth-child(6) { top: 20%;  left: 6px; animation-delay: 1.15s; }

        @keyframes sparklePop {
            0%   { transform: scale(0);   opacity: 0; }
            50%  { transform: scale(1.8); opacity: 1; }
            100% { transform: scale(1);   opacity: 0; }
        }

        /* ========== TEXT ENTRANCE ========== */
        .success-title {
            color: var(--gold);
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            animation: fadeSlideUp 0.5s ease 1.0s both;
        }

        .success-subtitle {
            color: #a08060;
            font-size: 14px;
            text-align: center;
            margin-top: -10px;
            animation: fadeSlideUp 0.5s ease 1.15s both;
        }

        @keyframes fadeSlideUp {
            from { transform: translateY(16px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        /* ========== ORDER CARD ========== */
        .order-card {
            background: linear-gradient(135deg, #fff8ee 0%, #fdf3dc 100%);
            border: 1px solid rgba(194,131,41,0.2);
            border-radius: 16px;
            padding: 18px 24px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 16px rgba(194,131,41,0.1);
            animation: fadeSlideUp 0.5s ease 1.25s both;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 14px;
            color: #5a4020;
        }

        .order-row .label { color: #a08060; }
        .order-row .value { font-weight: bold; color: var(--gold); }
        .order-divider {
            border: none;
            border-top: 1px solid rgba(194,131,41,0.15);
            margin: 4px 0;
        }

        /* ========== BUTTON ========== */
        .checkout-button-wrapper {
            animation: fadeSlideUp 0.5s ease 1.4s both;
            width: 100%;
        }

        .btn-orange.continue-btn {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
            box-shadow: 0 6px 20px rgba(194,131,41,0.35);
            border-radius: 14px;
            font-size: 16px;
            padding: 15px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-orange.continue-btn:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(194,131,41,0.2);
        }

        /* ========== CONFETTI ========== */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            opacity: 0;
            animation: confettiFall linear forwards;
            border-radius: 2px;
        }

        @keyframes confettiFall {
            0%   { transform: translateY(0) rotate(0deg);     opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="confirm-page">

    <!-- Confetti -->
    <div class="confetti-container" id="confetti"></div>

    <div class="iphone-container">
        
        <div class="top-section" style="background: white; width: 100%;">
            <div class="top-section-inner" style="width: 100%;">
                <nav class="navbar" style="display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100%; box-sizing: border-box !important; padding: 20px 40px 0 10px !important;">
                    <img src="logo_small.jpg" alt="Logo" class="logo-small" style="margin: 0; display: block;">
                    <div class="nav-links" style="display: flex !important; gap: 10px !important; margin: 0; padding: 0;">
                        <a href="#" style="text-decoration: none;">Home</a> 
                        <a href="#" style="text-decoration: none;">About</a> 
                        <a href="#" style="text-decoration: none;">Blog</a> 
                        <a href="#" style="text-decoration: none;">Collection</a>
                    </div>
                </nav>
                <header class="main-header" style="margin-top: 40px !important; width: 100%; display: flex; justify-content: center; align-items: center; margin-left: -25px;">
                    <img src="logo.png" alt="SITMATE Large Logo" class="logo-large" style="display: block; margin: 0 auto; margin-bottom: 30px;">
                </header>
            </div>
        </div>

        <div class="checkout-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; flex: 1; padding: 0 24px;">

            <!-- Animated checkmark -->
            <div class="check-wrapper">
                <div class="check-ring-outer"></div>
                <div class="check-pulse"></div>
                <div class="check-pulse delay"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="check-circle">
                    <svg class="check-svg" viewBox="0 0 56 56">
                        <polyline class="check-path" points="10,30 22,43 46,14"/>
                    </svg>
                </div>
            </div>

            <div class="success-title">Payment Successful!</div>
            <div class="success-subtitle">Your rental is confirmed and ready to go.</div>

            <!-- Order summary card -->
            <div class="order-card">
                <div class="order-row">
                    <span class="label">Product ID</span>
                    <span class="value">ST - 00126</span>
                </div>
                <hr class="order-divider">
                <div class="order-row">
                    <span class="label">Rental Fee</span>
                    <span class="value">40 THB</span>
                </div>
                <div class="order-row">
                    <span class="label">Security Deposit</span>
                    <span class="value">400 THB</span>
                </div>
                <hr class="order-divider">
                <div class="order-row" style="font-size:15px;">
                    <span class="label" style="font-weight:bold; color:#5a4020;">Total Paid</span>
                    <span class="value" style="font-size:17px;">440 THB</span>
                </div>
            </div>

            <div class="checkout-button-wrapper" style="margin-top: auto; margin-bottom: 40px;">
                <a href="index.html" class="btn-orange continue-btn" style="text-decoration: none; display: block; text-align: center; width: 100%; box-sizing: border-box;">Back to Home</a>
            </div>
        </div>
    </div>

    <audio id="success-sound" src="ding.mp3" preload="auto"></audio>

    <script>
        // Play sound on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                const audio = document.getElementById('success-sound');
                if (audio) audio.play().catch(() => {});
            }, 600);

            // Generate confetti
            const container = document.getElementById('confetti');
            const colors = ['#d89647', '#C28329', '#f5c842', '#fff0cc', '#e8a84a', '#ffd580'];
            const count = 55;

            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (Math.random() * 8 + 5) + 'px';
                piece.style.height = (Math.random() * 8 + 5) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                piece.style.animationDelay = (Math.random() * 0.8 + 0.7) + 's';
                container.appendChild(piece);
            }
        });
    </script>
</body>
</html>
