<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Track Status - SITMATE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="track-page">
    <div class="iphone-container">
        <div class="glass-panel-track"></div>

        <div class="logo-section">
            <img src="logo.png" alt="SITMATE">
        </div>

        <div class="product-id-section">
            <p>Product ID <span class="green-dot"></span></p>
            <h1>ST - 00126</h1>
        </div>

        <div class="timeline-container">
            <p class="date-orange">18 March 2026</p>
            
            <div class="timeline">
                <div class="step completed">
                    <div class="time orange-text">10:56</div>
                    <div class="label orange-text">Submit Rental Request</div>
                </div>
                <div class="step completed">
                    <div class="time orange-text">10:57</div>
                    <div class="label orange-text">Payment Successful</div>
                </div>
                <div class="step active completed">
                    <div class="time orange-text active-text">13:10</div>
                    <div class="label orange-text active-text">Currently Rented</div>
                </div>
                <div class="step">
                    <div class="time"></div>
                    <div class="label">Return at Destination</div>
                </div>
                <div class="step">
                    <div class="time"></div>
                    <div class="label">Inspect Product</div>
                </div>
                <div class="step">
                    <div class="time"></div>
                    <div class="label">Refund Deposit</div>
                </div>
            </div>
        </div>

        <div class="button-wrapper">
            <button class="btn-orange-compact btn-back" onclick="history.back()">Back</button>
            <button class="btn-orange-compact" onclick="/* ใส่ลิงก์ไปหน้า Report */">Report a Problem</button>
    </div>
</body>
</html>
