<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>How to Use - SITMATE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="how-to-page">
    <div class="iphone-container">
        
        <div class="top-section">
            <nav class="navbar">
                <img src="logo_small.jpg" alt="Logo" class="logo-small">
                <div class="nav-links">
                    <a href="#">Home</a> <a href="#">About</a> <a href="#">Blog</a> <a href="#">Collection</a>
                </div>
            </nav>
            <header class="main-header">
                <img src="logo.png" alt="SITMATE Large Logo" class="logo-large">
                <h1>How to Use</h1>
            </header>
        </div>

        <main class="steps-container">
            <div class="step-card left">
                <div class="step-content">
                    <img src="step1.jpg" alt="Step 1">
                    <p class="step-label">Unfold the Product</p>
                </div>
                <span class="step-number">1</span>
            </div>

            <div class="step-card right">
                <span class="step-number">2</span>
                <div class="step-content">
                    <img src="step2.jpg" alt="Step 2">
                    <p class="step-label">Pull out the rubber stopper</p>
                </div>
            </div>

            <div class="step-card left">
                <div class="step-content">
                    <img src="step3.jpg" alt="Step 3">
                    <p class="step-label">Fold the product</p>
                </div>
                <span class="step-number">3</span>
            </div>

            <div class="step-card right">
                <span class="step-number">4</span>
                <div class="step-content">
                    <img src="step4.jpg" alt="Step 4">
                    <p class="step-label">Attach under the product</p>
                </div>
            </div>
        </main>

        <div class="button-wrapper">
            <button class="btn-orange-compact" style="padding: 12px 60px;" onclick="window.location.href='index.html'">Back</button>
        </div>
        
    </div>
</body>
</html>
