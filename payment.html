<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Select Payment Method - SITMATE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="how-to-page checkout-page">
    <div class="iphone-container">
        
        <div class="top-section">
            <div class="top-section-inner">
                <nav class="navbar">
                    <img src="logo_small.jpg" alt="Logo" class="logo-small">
                    <div class="nav-links">
                        <a href="#">Home</a> <a href="#">About</a> <a href="#">Blog</a> <a href="#">Collection</a>
                    </div>
                </nav>
                <header class="main-header">
                    <img src="logo.png" alt="SITMATE Large Logo" class="logo-large">
                </header>
            </div>

            <div class="checkout-progress">
                <div class="checkout-step">
                    <div class="checkout-step-label">Select Pickup and<br>Return Location</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step active">
                    <div class="checkout-step-label">Select Payment<br>Method</div>
                    <div class="checkout-step-dot"></div>
                </div>
                <div class="checkout-step">
                    <div class="checkout-step-label">Pay</div>
                    <div class="checkout-step-dot"></div>
                </div>
            </div>
        </div>

        <div class="checkout-content">
            <div class="glass-box order-summary-section">
                <h2 class="box-title">Order summary</h2>
                
                <div class="summary-content">
                    <div class="summary-row">
                        <span>Subtatal</span>
                        <span>40 THB</span>
                    </div>
                    <hr class="summary-divider">
                    
                    <div class="summary-row">
                        <span>Security Deposit</span>
                        <span>400 THB</span>
                    </div>
                    <hr class="summary-divider">
                    
                    <div class="summary-row">
                        <span>Service Fee</span>
                        <span>FREE</span>
                    </div>
                    <hr class="summary-divider">
                    
                    <div class="summary-row total-cost">
                        <span>Total Price</span>
                        <span>440 THB</span>
                    </div>
                </div>
            </div>

            <div class="glass-box payment-method-section">
                <h2 class="box-title">Select payment method</h2>
                
                <div class="payment-grid">
                    <div class="payment-card"><img src="MasterCard_Logo.png" alt="MasterCard"></div>
                    <div class="payment-card"><img src="VISA-logo.png" alt="VISA"></div>
                    <div class="payment-card"><img src="PayPal.png" alt="PayPal"></div>
                    <div class="payment-card"><img src="prompt-pay-logo.png" alt="PromptPay"></div>
                </div>
                
                <div class="cash-section">
                    <span class="cash-label">Cash</span>
                    <img src="cash.png" alt="Cash" class="cash-img">
                </div>
            </div>

            <div class="checkout-button-wrapper">
                <a href="pay.html" class="btn-orange continue-btn" style="text-decoration: none; display: inline-block; text-align: center;">Continue</a>

            </div>
        </div>

    </div>
</body>
</html>
